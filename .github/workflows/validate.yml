name: Validate
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PHP syntax
        run: php -l AmbilightControl/module.php
      - name: JSON syntax
        run: |
          python3 -m json.tool library.json >/dev/null
          python3 -m json.tool AmbilightControl/module.json >/dev/null
          python3 -m json.tool AmbilightControl/form.json >/dev/null
          python3 -m json.tool AmbilightControl/locale.json >/dev/null
